<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CastCharm</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icon-apple.png" />
</head>
<body>
  <div id="sidebar-overlay"></div>

  <div id="app" style="display:none">
    <aside id="sidebar">
      <a class="logo" href="#/" style="text-decoration:none;color:inherit">
        <img src="/static/icon-64.png" alt="" class="logo-img" />
        <div class="logo-name">
          <span class="logo-text">CastCharm</span>
          <span class="logo-tagline">Podcast Manager</span>
        </div>
      </a>
      <button class="nav-item" id="nav-search-btn" style="width:100%;border:none;background:none;cursor:pointer;text-align:left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
      <nav id="nav">
        <a class="nav-item" data-view="dashboard" href="#/">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a class="nav-item" data-view="feeds" href="#/feeds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1" fill="currentColor"/></svg>
          Feeds
        </a>
        <a class="nav-item" data-view="downloads" href="#/downloads">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Downloads
          <span id="dl-nav-badge" style="display:none;margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center"></span>
        </a>
        <a class="nav-item" data-view="stats" href="#/stats">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Stats
        </a>
        <a class="nav-item" data-view="logs" href="#/logs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Logs
        </a>
        <a class="nav-item" data-view="settings" href="#/settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M17.66 6.34a8 8 0 0 1 0 11.32M6.34 6.34a8 8 0 0 0 0 11.32"/></svg>
          Settings
        </a>
      </nav>
      <div id="app-status">
        <div id="status-items">
          <div class="status-item"><span class="status-dot"></span><span>Loading…</span></div>
        </div>
      </div>
      <div id="logout-slot"></div>
      <div id="sidebar-footer">
        <span id="app-version">v1.0.0</span>
        <a href="/api/docs" target="_blank" rel="noopener" title="API docs">API docs</a>
      </div>
    </aside>

    <div id="mobile-header">
      <button id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="mobile-header-logo" id="mobile-header-logo" style="cursor:pointer">
        <img src="/static/icon-64.png" alt="" class="mobile-header-icon" />
        <span class="logo-text">CastCharm</span>
      </div>
    </div>

    <main id="content">
      <div class="loading-spinner">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="/static/api.js"></script>
  <script src="/static/ui.js"></script>
  <script src="/static/themes.js"></script>
  <script src="/static/router.js"></script>
  <script src="/static/player.js"></script>
  <script src="/static/views/dashboard.js"></script>
  <script src="/static/views/feeds.js"></script>
  <script src="/static/views/feed-detail.js"></script>
  <script src="/static/views/downloads.js"></script>
  <script src="/static/views/settings.js"></script>
  <script src="/static/views/stats.js"></script>
  <script src="/static/views/logs.js"></script>
  <script src="/static/views/login.js"></script>
  <script src="/static/views/setup.js"></script>
  <script src="/static/views/search.js"></script>
  <script src="/static/main.js"></script>
</body>
</html>
